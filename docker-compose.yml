services:
  hermes-skills-api:
    image: swayamjoshi87/hermes-skills-api:latest
    # Build from source instead:
    # build: .
    container_name: hermes-skills-api
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      # ─── YOUR installed skills (read-write — install/uninstall works) ───
      # This is where `hermes skills install` puts skills from the marketplace.
      # Mount your host's skills directory so the API reads/writes the SAME
      # skills your hermes CLI uses.
      - ~/.hermes/skills:/home/node/.hermes/skills

      # ─── Built-in skills from the hermes-agent repo (read-only) ───
      # These are the 93+ skills shipped with Hermes Agent itself.
      # Point this at wherever you cloned hermes-agent.
      # If you don't have a local clone, remove this mount — only hub-installed
      # skills will be visible via file lookup (search still works).
      - /home/server/hermes-agent/skills:/opt/hermes-skills:ro
    environment:
      - NODE_ENV=production
      - PORT=3100
      - HOME=/home/node
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/api/health', r => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
